<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>BodhiBeats</title>
<meta name="referrer" content="no-referrer">
<meta name="theme-color" content="#050608">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.webmanifest">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="vendor/three.r128.min.js"></script>
<script src="vendor/gsap.min.js"></script>
<script src="capacitor-bridge.js"></script>
<script>
(function(){
  var isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  var isCap = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
  window.bodhiBeatsPlatform = { isTouch: isTouch, isCapacitor: isCap, apiBase: '' };
  try { var qs = new URLSearchParams(location.search).get('api'); if (qs) { window.bodhiBeatsPlatform.apiBase = qs.replace(/\/+$/,''); } } catch(e) {}
  if (isTouch) document.documentElement.classList.add('bodhi-touch');
  var base = window.bodhiBeatsPlatform.apiBase;
  if (base) { var nf = window.fetch.bind(window); window.fetch = function(input, init){ if (typeof input === 'string' && input.charAt(0) === '/' && input.indexOf('/api/') === 0) input = base + input; return nf(input, init); }; }
})();
</script>

<style>
:root{
  --bg:#050608; --bg-2:#0a0c10; --surface:#0e1116; --surface-2:#161a21;
  --ink:#e8ecef; --ink-2:#a8b0bb; --muted:#6b7280;
  --accent:#00f5d4; --accent-rgb:0,245,212;
  --warm:#f4d28a; --warm-rgb:244,210,138;
  --glass-border:rgba(255,255,255,.08);
  --radius:16px; --radius-lg:24px; --radius-xl:32px;
  --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
  --nav-h:56px; --player-h:64px;
  --font:"Noto Sans SC","Inter",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{font-family:var(--font);background:var(--bg);color:var(--ink);overflow:hidden;height:100%;width:100%;user-select:none;-webkit-font-smoothing:antialiased;-webkit-touch-callout:none}
body{position:fixed;inset:0;touch-action:manipulation}
#canvas-container{position:fixed;inset:0;z-index:0}
#canvas-container canvas{display:block;width:100%!important;height:100%!important}
#app{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;overflow:hidden}
#app.hidden{display:none}
#view-container{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;position:relative;z-index:10}
.view{display:none;padding:calc(var(--safe-top) + 12px) 16px calc(var(--nav-h) + var(--player-h) + 24px + var(--safe-bottom));min-height:100%;animation:viewIn .3s ease}
.view.active{display:block}
@keyframes viewIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
#bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:rgba(5,6,8,.92);backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);border-top:1px solid var(--glass-border);display:flex;align-items:stretch;z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--muted);font-size:10px;font-weight:500;cursor:pointer;transition:color .2s;min-height:44px}
.nav-item.active{color:var(--accent)}
.nav-item svg{width:22px;height:22px;stroke:currentColor;stroke-width:2;fill:none}
#mini-player{position:fixed;bottom:calc(var(--nav-h) + var(--safe-bottom));left:0;right:0;height:var(--player-h);background:rgba(10,12,16,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--glass-border);display:flex;align-items:center;padding:0 12px;gap:10px;z-index:99;transition:transform .3s,opacity .3s;cursor:pointer}
#mini-player.hidden{transform:translateY(110%);opacity:0;pointer-events:none}
#mini-player .mp-cover{width:44px;height:44px;border-radius:10px;object-fit:cover;background:var(--surface-2);flex-shrink:0}
#mini-player .mp-info{flex:1;min-width:0}
#mini-player .mp-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#mini-player .mp-artist{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
#mini-player .mp-play-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;color:var(--ink);flex-shrink:0}
#mini-player .mp-play-btn svg{width:24px;height:24px;fill:currentColor}
#mini-player .mp-progress{position:absolute;bottom:0;left:0;height:2px;background:var(--accent);width:0%;opacity:.7;transition:width .3s linear}
.home-greeting{font-size:24px;font-weight:700;margin-bottom:4px}
.home-date{font-size:13px;color:var(--muted);margin-bottom:20px}
.home-section{margin-bottom:28px}
.home-section-title{font-size:16px;font-weight:600;margin-bottom:12px}
.tile-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.tile{background:var(--surface);border:1px solid var(--glass-border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .15s}
.tile:active{transform:scale(.97)}
.tile .tile-cover{width:100%;aspect-ratio:1;object-fit:cover;background:var(--surface-2);display:block}
.tile .tile-body{padding:10px 12px}
.tile .tile-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tile .tile-sub{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.weather-card{background:linear-gradient(135deg,rgba(var(--accent-rgb),.12),rgba(36,66,255,.08));border:1px solid rgba(var(--accent-rgb),.2);border-radius:var(--radius-lg);padding:20px;margin-bottom:20px;cursor:pointer}
.weather-card:active{transform:scale(.98)}
.weather-card .wc-temp{font-size:36px;font-weight:300}
.weather-card .wc-city{font-size:14px;color:var(--ink-2);margin-top:2px}
.weather-card .wc-mood{font-size:12px;color:var(--accent);margin-top:8px}
.weather-card .wc-play{margin-top:12px;padding:8px 16px;border:none;border-radius:999px;background:rgba(var(--accent-rgb),.2);color:var(--accent);font-size:12px;font-weight:600;cursor:pointer}
.search-header{position:sticky;top:calc(var(--safe-top) + 12px);z-index:20;background:rgba(5,6,8,.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:8px 0 12px;margin:-8px 0 16px}
.search-box{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--glass-border);border-radius:999px;padding:0 16px;height:44px}
.search-box input{flex:1;background:none;border:none;outline:none;color:var(--ink);font-size:16px;font-family:var(--font)}
.search-box input::placeholder{color:var(--muted)}
.search-box .search-icon{width:18px;height:18px;color:var(--muted);flex-shrink:0}
.search-tabs{display:flex;gap:8px;margin-top:10px;overflow-x:auto;scrollbar-width:none}
.search-tabs::-webkit-scrollbar{display:none}
.search-tab{padding:6px 14px;border-radius:999px;font-size:12px;font-weight:500;white-space:nowrap;background:var(--surface);color:var(--ink-2);border:1px solid var(--glass-border);cursor:pointer}
.search-tab.active{background:rgba(var(--accent-rgb),.15);color:var(--accent);border-color:rgba(var(--accent-rgb),.3)}
.search-result-list{display:flex;flex-direction:column;gap:8px}
.search-result-item{display:flex;align-items:center;gap:12px;padding:10px;background:var(--surface);border:1px solid var(--glass-border);border-radius:var(--radius);cursor:pointer;transition:transform .15s}
.search-result-item:active{transform:scale(.98)}
.search-result-item .sri-cover{width:52px;height:52px;border-radius:10px;object-fit:cover;background:var(--surface-2);flex-shrink:0}
.search-result-item .sri-info{flex:1;min-width:0}
.search-result-item .sri-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-result-item .sri-artist{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-result-item .sri-source{font-size:10px;padding:2px 6px;border-radius:6px;margin-top:3px;display:inline-block}
.search-result-item .sri-source.netease{background:rgba(217,91,103,.15);color:#d95b67}
.search-result-item .sri-source.qq{background:rgba(var(--accent-rgb),.15);color:var(--accent)}
.search-result-item .sri-play{width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.search-result-item .sri-play svg{width:20px;height:20px;fill:currentColor}
.playlist-track{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:12px;cursor:pointer;transition:background .15s}
.playlist-track:active{background:var(--surface)}
.playlist-track.playing{background:rgba(var(--accent-rgb),.08)}
.playlist-track .pt-idx{width:24px;text-align:center;font-size:12px;color:var(--muted);flex-shrink:0}
.playlist-track.playing .pt-idx{color:var(--accent)}
.playlist-track .pt-info{flex:1;min-width:0}
.playlist-track .pt-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.playlist-track.playing .pt-title{color:var(--accent)}
.playlist-track .pt-artist{font-size:11px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#full-player{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1)}
#full-player.show{transform:translateY(0)}
#full-player .fp-bg{position:absolute;inset:0;z-index:0;overflow:hidden}
#full-player .fp-bg img{width:100%;height:100%;object-fit:cover;filter:blur(60px) saturate(1.5) brightness(.4);transform:scale(1.3)}
#full-player .fp-content{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;padding:calc(var(--safe-top) + 16px) 24px calc(var(--safe-bottom) + 24px)}
#full-player .fp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
#full-player .fp-down{width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:var(--ink);cursor:pointer}
#full-player .fp-down svg{width:22px;height:22px;stroke:currentColor;stroke-width:2;fill:none}
#full-player .fp-title-bar{text-align:center}
#full-player .fp-from{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
#full-player .fp-name{font-size:15px;font-weight:600;margin-top:2px}
#full-player .fp-cover-wrap{flex:1;display:flex;align-items:center;justify-content:center;min-height:0}
#full-player .fp-cover{width:min(75vw,300px);height:min(75vw,300px);border-radius:var(--radius-lg);object-fit:cover;background:var(--surface-2);box-shadow:0 20px 60px rgba(0,0,0,.5)}
#full-player .fp-meta{text-align:center;margin:20px 0 16px}
#full-player .fp-meta .fp-song{font-size:20px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#full-player .fp-meta .fp-artist{font-size:14px;color:var(--ink-2);margin-top:4px}
#full-player .fp-lyrics{flex:1;text-align:center;overflow-y:auto;padding:0 20px;min-height:60px;max-height:120px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#full-player .fp-lyrics::-webkit-scrollbar{display:none}
#full-player .fp-lyric-line{font-size:15px;color:var(--muted);padding:4px 0;transition:all .3s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#full-player .fp-lyric-line.active{color:var(--accent);font-size:17px;font-weight:600}
#full-player .fp-progress{margin:16px 0}
#full-player .fp-progress-bar{height:4px;background:rgba(255,255,255,.1);border-radius:999px;position:relative;cursor:pointer}
#full-player .fp-progress-fill{height:100%;background:var(--accent);border-radius:999px;width:0%;transition:width .3s linear}
#full-player .fp-progress-handle{position:absolute;top:50%;left:0;width:12px;height:12px;border-radius:50%;background:var(--accent);transform:translate(-50%,-50%);transition:left .3s linear}
#full-player .fp-time{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:6px;font-variant-numeric:tabular-nums}
#full-player .fp-controls{display:flex;align-items:center;justify-content:space-around;margin-top:16px}
#full-player .fp-btn{width:48px;height:48px;display:flex;align-items:center;justify-content:center;color:var(--ink);cursor:pointer}
#full-player .fp-btn:active{transform:scale(.88)}
#full-player .fp-btn svg{width:26px;height:26px;fill:currentColor}
#full-player .fp-btn.play svg{width:36px;height:36px}
#full-player .fp-btn.mode svg,.fp-btn.list svg{width:22px;height:22px;stroke:currentColor;stroke-width:2;fill:none}
.bottom-sheet{position:fixed;bottom:0;left:0;right:0;z-index:150;background:rgba(10,12,16,.96);backdrop-filter:blur(24px) saturate(1.6);-webkit-backdrop-filter:blur(24px) saturate(1.6);border-top:1px solid var(--glass-border);border-radius:var(--radius-xl) var(--radius-xl) 0 0;max-height:70vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);padding-bottom:var(--safe-bottom)}
.bottom-sheet.show{transform:translateY(0)}
.bottom-sheet .bs-handle{width:36px;height:4px;background:var(--muted);border-radius:999px;margin:8px auto 4px;opacity:.5;cursor:pointer}
.bottom-sheet .bs-title{font-size:16px;font-weight:600;text-align:center;margin-bottom:16px;padding:0 20px}
.bottom-sheet .bs-content{overflow-y:auto;padding:0 20px 20px;-webkit-overflow-scrolling:touch;flex:1}
.vp-section{margin-bottom:20px}
.vp-section-title{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.vp-preset-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.vp-preset{padding:10px 8px;border:1px solid var(--glass-border);border-radius:12px;background:var(--surface);text-align:center;font-size:11px;font-weight:500;color:var(--ink-2);cursor:pointer;transition:all .2s}
.vp-preset.active{border-color:var(--accent);background:rgba(var(--accent-rgb),.1);color:var(--accent)}
.vp-preset:active{transform:scale(.95)}
.vp-slider-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.vp-slider-row .vp-label{font-size:12px;color:var(--ink-2);width:72px;flex-shrink:0}
.vp-slider-row .vp-slider{flex:1}
.vp-slider-row .vp-slider input{width:100%;height:4px;-webkit-appearance:none;appearance:none;background:var(--surface-2);border-radius:999px;outline:none}
.vp-slider-row .vp-slider input::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer}
.vp-slider-row .vp-slider input::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;border:none}
.vp-slider-row .vp-value{font-size:11px;color:var(--muted);width:36px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
.login-tabs{display:flex;gap:8px;margin-bottom:20px}
.login-tab{flex:1;padding:10px;border:1px solid var(--glass-border);border-radius:12px;background:var(--surface);text-align:center;font-size:13px;font-weight:500;color:var(--ink-2);cursor:pointer}
.login-tab.active{background:rgba(var(--accent-rgb),.1);color:var(--accent);border-color:rgba(var(--accent-rgb),.3)}
#qr-container{display:flex;flex-direction:column;align-items:center;gap:16px}
#qr-container .qr-img{width:200px;height:200px;border-radius:var(--radius);background:var(--surface-2);object-fit:contain}
#qr-container .qr-status{font-size:13px;color:var(--ink-2);text-align:center}
#qr-container .qr-status.fail{color:#f08080}
#qr-container .qr-status.scan{color:var(--accent)}
.cookie-panel{margin-top:16px;display:none;flex-direction:column;gap:12px}
.cookie-panel.show{display:flex}
.cookie-panel textarea{width:100%;height:80px;resize:none;border:1px solid var(--glass-border);border-radius:12px;background:var(--surface);color:var(--ink);padding:12px;font-family:var(--font);font-size:12px;outline:none}
.cookie-panel .cookie-note{font-size:11px;color:var(--muted)}
.cookie-panel .cookie-btn{padding:10px;border:none;border-radius:12px;background:var(--accent);color:#000;font-size:13px;font-weight:600;cursor:pointer}
.login-actions{display:flex;gap:8px;margin-top:16px}
.login-actions button{flex:1;padding:12px;border:1px solid var(--glass-border);border-radius:12px;background:var(--surface);color:var(--ink);font-size:13px;font-weight:500;cursor:pointer}
.login-actions button:active{transform:scale(.97)}
.login-actions button.primary{background:var(--accent);color:#000;border-color:var(--accent)}
#toast{position:fixed;bottom:calc(var(--nav-h) + var(--player-h) + 20px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(20px);z-index:500;background:rgba(20,24,30,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--glass-border);border-radius:999px;padding:10px 20px;font-size:13px;color:var(--ink);opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#overlay{position:fixed;inset:0;z-index:140;background:rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .3s}
#overlay.show{opacity:1;pointer-events:auto}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
.loading-spinner{width:24px;height:24px;border:2px solid var(--surface-2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:20px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}

/* ===== Splash CSS ===== */
#splash{position:fixed;inset:0;z-index:300;background:#010304;display:flex;align-items:center;justify-content:center;pointer-events:auto;opacity:1;overflow:hidden;transition:opacity 1180ms cubic-bezier(.16,1,.3,1),transform 1180ms cubic-bezier(.16,1,.3,1);box-shadow:inset 0 0 180px rgba(0,0,0,.88)}
#splash::before{content:'';position:absolute;inset:-8%;z-index:0;background:linear-gradient(115deg,transparent 0%,rgba(255,83,103,.055) 24%,transparent 42%,rgba(244,210,138,.052) 62%,transparent 82%),repeating-linear-gradient(90deg,rgba(255,255,255,.030) 0 1px,transparent 1px 54px),repeating-linear-gradient(0deg,rgba(255,255,255,.020) 0 1px,transparent 1px 46px),linear-gradient(180deg,#020606 0%,#050607 42%,#000 100%);filter:blur(.4px);opacity:.90;animation:splash-field-breathe 7s ease-in-out infinite alternate;pointer-events:none}
#splash::after{content:'';position:absolute;inset:0;z-index:2;background:linear-gradient(90deg,rgba(0,0,0,.82),transparent 21%,transparent 79%,rgba(0,0,0,.82)),linear-gradient(180deg,rgba(0,0,0,.68),transparent 32%,transparent 64%,rgba(0,0,0,.74));pointer-events:none}
#splash.hide{pointer-events:none}
#splash.ready{cursor:pointer}
#splash.exiting{pointer-events:none;opacity:0;transform:scale(1.018)}
#splash-canvas{position:absolute;inset:0;z-index:1;opacity:1;transition:opacity 1100ms cubic-bezier(.22,1,.36,1),transform 1100ms cubic-bezier(.22,1,.36,1)}
#splash.exiting #splash-canvas{opacity:.30;transform:scale(1.012)}
.splash-bg-noise{position:absolute;inset:0;z-index:3;opacity:.038;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.55'/%3E%3C/svg%3E");background-size:180px 180px;mix-blend-mode:screen;pointer-events:none}
.splash-content{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:16px;pointer-events:none;transform:translateY(4px);transition:opacity 680ms cubic-bezier(.22,1,.36,1),transform 860ms cubic-bezier(.22,1,.36,1)}
.splash-wordmark{position:relative;display:flex;align-items:baseline;justify-content:center;height:clamp(70px,12vw,136px);min-width:min(74vw,760px);font-size:clamp(52px,8.8vw,112px);line-height:.92;font-weight:720;letter-spacing:-.055em;color:#f8f8f2;text-shadow:0 20px 82px rgba(0,0,0,.68),-2px 0 18px rgba(255,83,103,.16),2px 0 18px rgba(122,215,194,.12);isolation:isolate;filter:drop-shadow(0 0 22px rgba(244,210,138,.075))}
.splash-word-bodhi,.splash-word-beats{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);white-space:nowrap;will-change:opacity,transform,letter-spacing}

function splashSmoothstep(edge0, edge1, x) {
  var t = splashClamp01((x - edge0) / Math.max(0.0001, edge1 - edge0));
  return t * t * (3 - 2 * t);
}
function splashEaseOutCubic(t) {
  t = splashClamp01(t);
  return 1 - Math.pow(1 - t, 3);
}

function initBodhiBeatsSplashWebgl(canvas) {
  var gl = null;
  try {
    gl = canvas.getContext('webgl', {
      alpha: true,

      depth: false,

    'varying vec2 vUv;',
    'uniform vec2 uResolution;',

    'mat2 rot(float a){ float c = cos(a); float s = sin(a); return mat2(c, -s, s, c); }',

    'float noise(vec2 p){',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',

    '  return mix(mix(hash(i), hash(i + vec2(1.0,0.0)), u.x), mix(hash(i + vec2(0.0,1.0)), hash(i + vec2(1.0,1.0)), u.x), u.y);',
    '}',
    '',
    'float animatedLoop(vec2 uv, float t, float channel){',
    '  vec2 q = uv;',
    '  q *= rot(0.28 + sin(t * 0.18) * 0.12);',
    '  q.x += 0.055 * sin(t * 0.30 + channel);',
    '  q.y += 0.040 * cos(t * 0.24 + channel * 1.7);',
    '  float ang = atan(q.y, q.x);',
    '  float angularShift = sin(ang * 3.0 + t * 0.72 + channel * 1.9) * 0.078;',
    '  angularShift += sin(ang * 7.0 - t * 0.54 + channel) * 0.020;',
    '  float neonD = length(q) + angularShift;',
    '  float warpD = length(q * vec2(1.34 + 0.06 * sin(t * 0.25), 0.82 + 0.04 * cos(t * 0.31)));',
    '  warpD += 0.026 * sin(q.x * 4.4 + t * 0.62) + 0.018 * sin(q.y * 5.2 - t * 0.45);',
    '  float diamondD = abs(q.x) * 1.20 + abs(q.y) * 0.84;',
    '  float d = mix(warpD, diamondD, 0.32);',
    '  d = mix(d, neonD, 0.20 + 0.04 * sin(t * 0.18 + channel));',
    '  float pattern = mod((q.x + q.y) * 0.62 + sin(q.x * 5.5 + t) * 0.015 + sin(q.y * 7.0 - t * 0.75) * 0.012, 0.20);',
    '  float acc = 0.0;',
    '  for (int i = 1; i <= 6; i++) {',
    '    float fi = float(i);',
    '    float f = fract(t * 0.152 - channel * 0.018 + 0.011 * fi) * 4.70 - d + pattern;',
    '    acc += 0.00110 * fi * fi / max(abs(f), 0.0065);',
    '  }',
    '  float threadCoord = q.x * 0.92 - q.y * 0.58 + 0.030 * sin(q.x * 5.2 + t * 0.72);',

  function compile(type, source) {

  var fragmentShader = compile(gl.FRAGMENT_SHADER, fragmentSource);
  if (!vertexShader || !fragmentShader) return false;

  var program = gl.createProgram();
  gl.attachShader(program, vertexShader);
  gl.attachShader(program, fragmentShader);
  gl.linkProgram(program);
  gl.deleteShader(vertexShader);
  gl.deleteShader(fragmentShader);

  gl.useProgram(splashGlProgram);
  gl.bindBuffer(gl.ARRAY_BUFFER, splashGlBuffer);
  gl.enableVertexAttribArray(splashGlUniforms.position);
  gl.vertexAttribPointer(splashGlUniforms.position, 2, gl.FLOAT, false, 0, 0);
  gl.uniform2f(splashGlUniforms.resolution, splashCanvas.width, splashCanvas.height);
  gl.uniform1f(splashGlUniforms.time, elapsed);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
}

function drawBodhiBeatsSplash() {
  if (!splashAnimating || (!splashCtx && !splashGl)) return;
  requestAnimationFrame(drawBodhiBeatsSplash);
  var elapsed = (performance.now() - splashStartedAt) / 1000;
  if (splashGl && splashGlProgram) {
    drawBodhiBeatsSplashWebgl(elapsed);
    return;
  }
  splashCtx.clearRect(0, 0, splashW, splashH);

  var base = splashCtx.createLinearGradient(0, 0, splashW, splashH);
  base.addColorStop(0, 'rgba(1,6,7,0.68)');
  base.addColorStop(0.45, 'rgba(10,9,12,0.74)');
  base.addColorStop(1, 'rgba(0,0,0,0.84)');
  splashCtx.fillStyle = base;
  splashCtx.fillRect(0, 0, splashW, splashH);

  splashCtx.save();
  splashCtx.globalAlpha = 0.22;
  splashCtx.fillStyle = 'rgba(255,255,255,0.035)';
  var scanOffset = (elapsed * 28) % 36;
  for (var sy = -scanOffset; sy < splashH; sy += 36) splashCtx.fillRect(0, sy, splashW, 1);
  splashCtx.restore();

  for (var i = 0; i < splashDust.length; i++) {
    var d = splashDust[i];
    d.x += d.vx;
    d.y += d.vy;
    d.p += 0.018;
    if (d.x < -10) d.x = splashW + 10;
    if (d.x > splashW + 10) d.x = -10;
    if (d.y < -10) d.y = splashH + 10;
    if (d.y > splashH + 10) d.y = -10;
    var alpha = d.a * (0.58 + Math.sin(d.p + elapsed * 0.8) * 0.34);
    splashCtx.beginPath();
    splashCtx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
    splashCtx.fillStyle = 'rgba(255,255,255,' + Math.max(0, alpha) + ')';
    splashCtx.fill();
  }

  splashCtx.save();
  splashCtx.globalCompositeOperation = 'lighter';
  for (var k = 0; k < splashStreaks.length; k++) {
    var st = splashStreaks[k];
    var travel = (elapsed * st.speed * 240 + st.x + Math.sin(elapsed * 0.8 + st.phase) * 28) % (splashW + st.len + 180);
    var px = travel - st.len - 90;
    var py = st.y + Math.sin(elapsed * 0.75 + st.phase) * 18;
    var fade = splashSmoothstep(st.delay * 0.55, st.delay * 0.55 + 0.52, elapsed) * (1 - splashSmoothstep(3.52, 4.12, elapsed));
    if (fade <= 0) continue;
    splashCtx.save();
    splashCtx.translate(px, py);
    splashCtx.rotate(st.angle);
    var sg = splashCtx.createLinearGradient(-st.len * 0.5, 0, st.len * 0.5, 0);
    sg.addColorStop(0, st.color + '0)');
    sg.addColorStop(0.52, st.color + (st.alpha * fade).toFixed(3) + ')');
    sg.addColorStop(1, 'rgba(255,255,255,0)');
    splashCtx.strokeStyle = sg;
    splashCtx.lineWidth = st.width;
    splashCtx.shadowColor = st.color + (0.34 * fade).toFixed(3) + ')';
    splashCtx.shadowBlur = 18;
    splashCtx.beginPath();
    splashCtx.moveTo(-st.len * 0.5, 0);
    splashCtx.lineTo(st.len * 0.5, 0);
    splashCtx.stroke();
    splashCtx.restore();
  }

  var lineT = splashEaseOutCubic((elapsed - 0.12) / 1.18);
  var exitFade = 1 - splashSmoothstep(3.58, 4.12, elapsed);
  if (lineT > 0 && exitFade > 0) {
    var centerY = splashH * 0.5 + Math.sin(elapsed * 1.4) * 1.6;
    var slitW = splashW * (0.16 + lineT * 0.72);
    var left = splashW * 0.5 - slitW * 0.5;
    var right = splashW * 0.5 + slitW * 0.5;
    var coreAlpha = (0.34 + lineT * 0.58) * exitFade;
    var slitGrad = splashCtx.createLinearGradient(left, centerY, right, centerY);
    slitGrad.addColorStop(0, 'rgba(255,83,103,0)');
    slitGrad.addColorStop(0.18, 'rgba(255,83,103,' + (0.18 * exitFade).toFixed(3) + ')');
    slitGrad.addColorStop(0.50, 'rgba(255,255,255,' + coreAlpha.toFixed(3) + ')');
    slitGrad.addColorStop(0.68, 'rgba(244,210,138,' + (0.38 * exitFade).toFixed(3) + ')');
    slitGrad.addColorStop(0.84, 'rgba(122,215,194,' + (0.20 * exitFade).toFixed(3) + ')');
    slitGrad.addColorStop(1, 'rgba(122,215,194,0)');
    splashCtx.shadowColor = 'rgba(244,210,138,' + (0.48 * exitFade).toFixed(3) + ')';
    splashCtx.shadowBlur = 42 + lineT * 42;
    splashCtx.lineCap = 'round';
    splashCtx.strokeStyle = slitGrad;
    splashCtx.lineWidth = 1.4 + lineT * 2.2;
    splashCtx.beginPath();
    splashCtx.moveTo(left, centerY);
    splashCtx.lineTo(right, centerY);
    splashCtx.stroke();

    var ignition = Math.exp(-Math.pow((elapsed - 0.72) / 0.26, 2));
    if (ignition > 0.018) {
      var ig = splashCtx.createLinearGradient(0, centerY, splashW, centerY);
      ig.addColorStop(0, 'rgba(122,215,194,0)');
      ig.addColorStop(0.46, 'rgba(122,215,194,' + (0.07 * ignition).toFixed(3) + ')');
      ig.addColorStop(0.50, 'rgba(255,255,255,' + (0.16 * ignition).toFixed(3) + ')');
      ig.addColorStop(0.54, 'rgba(255,83,103,' + (0.08 * ignition).toFixed(3) + ')');
      ig.addColorStop(1, 'rgba(244,210,138,0)');
      splashCtx.fillStyle = ig;
      splashCtx.fillRect(0, centerY - 48 * ignition, splashW, 96 * ignition);
    }

    var waveAlpha = splashSmoothstep(0.72, 1.95, elapsed) * exitFade;
    if (waveAlpha > 0) {
      splashCtx.shadowBlur = 20;
      splashCtx.strokeStyle = 'rgba(244,210,138,' + (0.22 * waveAlpha).toFixed(3) + ')';
      splashCtx.lineWidth = 1;
      splashCtx.beginPath();
      var steps = 82;
      for (var wi = 0; wi <= steps; wi++) {
        var u = wi / steps;
        var x = left + slitW * u;
        var edge = 1 - Math.abs(u - 0.5) * 2;
        var amp = (4 + 18 * lineT) * Math.pow(Math.max(0, edge), 1.4) * waveAlpha;
        var y = centerY + Math.sin(u * 34 + elapsed * 8.2) * amp + Math.sin(u * 87 - elapsed * 5.1) * amp * 0.18;
        if (wi === 0) splashCtx.moveTo(x, y);
        else splashCtx.lineTo(x, y);
      }
      splashCtx.stroke();
    }

    var shardT = splashSmoothstep(0.72, 2.45, elapsed) * exitFade;
    for (var si = 0; si < splashShards.length; si++) {
      var sh = splashShards[si];
      var drift = Math.sin(elapsed * 1.7 + sh.phase) * 22;
      var sx = splashW * 0.5 + sh.ox * (0.18 + shardT * 0.82) + drift;
      var sy2 = centerY + sh.oy * (0.20 + shardT * 0.92);
      var localAlpha = sh.alpha * shardT * (0.62 + Math.sin(elapsed * 5 + sh.phase) * 0.38);
      if (localAlpha <= 0) continue;
      splashCtx.save();
      splashCtx.translate(sx, sy2);
      splashCtx.rotate((-6 + sh.skew * 0.10) * Math.PI / 180);
      splashCtx.fillStyle = sh.color + Math.max(0, localAlpha).toFixed(3) + ')';
      splashCtx.shadowColor = sh.color + Math.min(0.38, localAlpha * 1.2).toFixed(3) + ')';
      splashCtx.shadowBlur = 14;
      splashCtx.beginPath();
      splashCtx.moveTo(-sh.w * 0.5, -sh.h * 0.5);
      splashCtx.lineTo(sh.w * 0.5, -sh.h * 0.5);
      splashCtx.lineTo(sh.w * 0.5 + sh.skew, sh.h * 0.5);
      splashCtx.lineTo(-sh.w * 0.5 + sh.skew, sh.h * 0.5);
      splashCtx.closePath();
      splashCtx.fill();
      splashCtx.restore();
    }

    var flash = Math.exp(-Math.pow((elapsed - 2.52) / 0.38, 2));
    if (flash > 0.015) {
      var fg = splashCtx.createLinearGradient(0, centerY, splashW, centerY);
      fg.addColorStop(0, 'rgba(255,83,103,0)');
      fg.addColorStop(0.48, 'rgba(255,255,255,' + (0.20 * flash).toFixed(3) + ')');
      fg.addColorStop(0.52, 'rgba(244,210,138,' + (0.24 * flash).toFixed(3) + ')');
      fg.addColorStop(1, 'rgba(122,215,194,0)');
      splashCtx.fillStyle = fg;
      splashCtx.fillRect(0, centerY - 46 * flash, splashW, 92 * flash);
    }
  }
  splashCtx.restore();
}

function playBodhiBeatsIntroSound() {
  if (splashSoundPlayed) return;
  try {
    var AudioContextCtor = window.AudioContext || window.webkitAudioContext;
    if (!AudioContextCtor) return;
    var ctx = splashAudioCtx || new AudioContextCtor();
    splashAudioCtx = ctx;
    if (ctx.state === 'suspended' && ctx.resume) {
      ctx.resume().then(function(){
        if (!splashSoundPlayed) playBodhiBeatsIntroSound();
      }).catch(function(){});
      if (ctx.state === 'suspended') return;
    }
    splashSoundPlayed = true;

    var now = ctx.currentTime + 0.02;
    var master = ctx.createGain();
    master.gain.setValueAtTime(0.0001, now);
    master.gain.exponentialRampToValueAtTime(0.062, now + 0.16);
    master.gain.exponentialRampToValueAtTime(0.040, now + 3.35);
    master.gain.exponentialRampToValueAtTime(0.0001, now + 5.28);
    master.connect(ctx.destination);

    var noiseBuffer = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 2.45), ctx.sampleRate);
    var data = noiseBuffer.getChannelData(0);
    for (var i = 0; i < data.length; i++) {
      var tail = 1 - i / data.length;
      data[i] = (Math.random() * 2 - 1) * Math.pow(tail, 1.35);
    }
    var noise = ctx.createBufferSource();
    var noiseGain = ctx.createGain();
    var noiseFilter = ctx.createBiquadFilter();
    noise.buffer = noiseBuffer;
    noiseFilter.type = 'bandpass';
    noiseFilter.frequency.setValueAtTime(720, now);
    noiseFilter.frequency.exponentialRampToValueAtTime(2400, now + 2.2);
    noiseFilter.Q.setValueAtTime(0.72, now);
    noiseGain.gain.setValueAtTime(0.0001, now);
    noiseGain.gain.exponentialRampToValueAtTime(0.020, now + 0.12);
    noiseGain.gain.exponentialRampToValueAtTime(0.010, now + 1.60);
    noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 2.42);
    noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(master);
    noise.start(now); noise.stop(now + 2.46);

    var low = ctx.createOscillator();
    var lowGain = ctx.createGain();
    low.type = 'sine';
    low.frequency.setValueAtTime(86, now + 0.18);
    low.frequency.exponentialRampToValueAtTime(43, now + 1.18);
    lowGain.gain.setValueAtTime(0.0001, now + 0.12);
    lowGain.gain.exponentialRampToValueAtTime(0.032, now + 0.30);
    lowGain.gain.exponentialRampToValueAtTime(0.0001, now + 1.34);
    low.connect(lowGain); lowGain.connect(master);
    low.start(now + 0.12); low.stop(now + 1.40);

    function softTone(type, f0, f1, startAt, dur, peak) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      var filter = ctx.createBiquadFilter();
      osc.type = type;
      osc.frequency.setValueAtTime(f0, now + startAt);
      osc.frequency.exponentialRampToValueAtTime(f1, now + startAt + dur * 0.72);
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(3400, now + startAt);
      gain.gain.setValueAtTime(0.0001, now + startAt);
      gain.gain.exponentialRampToValueAtTime(peak, now + startAt + 0.08);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + startAt + dur);
      osc.connect(filter); filter.connect(gain); gain.connect(master);
      osc.start(now + startAt);
      osc.stop(now + startAt + dur + 0.04);
    }
    softTone('triangle', 440, 660, 1.05, 0.72, 0.018);
    softTone('sine', 880, 1320, 2.10, 0.86, 0.013);
    softTone('triangle', 1180, 1760, 2.72, 0.52, 0.010);
    softTone('triangle', 660, 1180, 3.32, 0.82, 0.014);

var PRESET_NAMES = ['Emily','安魂','星河','唱片','星球','滚筒','虚空'];

async function apiJson(url, opts) {
  opts = opts || {}; var timer = null; var fo = Object.assign({}, opts); delete fo.timeoutMs;
  if (opts.timeoutMs && window.AbortController && !fo.signal) { var c = new AbortController(); fo.signal = c.signal; timer = setTimeout(function(){c.abort();}, opts.timeoutMs); }
  try { var r = await fetch(url, fo); return await r.json(); } finally { if (timer) clearTimeout(timer); }
}
function songCoverSrc(s, sz) {
  if (!s) return ''; var u = s.cover || (s.al && s.al.picUrl) || (s.album && s.album.picUrl) || '';
  if (!u) return ''; if (u.indexOf('//') === 0) u = 'https:' + u;
  return '/api/cover?url=' + encodeURIComponent(u);
}
function songArtist(s) { return s ? (s.artist || (s.ar && s.ar[0] && s.ar[0].name) || (s.artists && s.artists[0] && s.artists[0].name) || '') : ''; }
function songTitle(s) { return s ? (s.name || s.title || '') : ''; }
function escapeHtml(s) { var d = document.createElement('div'); d.textContent = String(s || ''); return d.innerHTML; }
function formatTime(s) { if (!s || !isFinite(s)) return '0:00'; var m = Math.floor(s / 60), sec = Math.floor(s % 60); return m + ':' + (sec < 10 ? '0' : '') + sec; }

var toastTimer = null;
function showToast(msg) {
  var el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer); toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2400);
}

function switchView(name) {
  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
  document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
  var v = document.getElementById('view-' + name); if (v) v.classList.add('active');
  var n = document.querySelector('.nav-item[data-view="' + name + '"]'); if (n) n.classList.add('active');
  document.getElementById('view-container').scrollTop = 0;
  if (name === 'home') loadHome();
  if (name === 'library') loadLibrary();
  if (name === 'visual') renderVisualControls();
}

// 搜索
var searchTimer = null;
document.getElementById('search-input').addEventListener('input', function(e) {
  var q = e.target.value.trim(); if (searchTimer) clearTimeout(searchTimer);
  if (!q) { document.getElementById('search-results').innerHTML = '<div class="empty-state">输入关键词开始搜索</div>'; return; }
  searchTimer = setTimeout(function() { doSearch(q); }, 500);
});
document.querySelectorAll('.search-tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.search-tab').forEach(function(t) { t.classList.remove('active'); });
    tab.classList.add('active'); searchMode = tab.dataset.mode;
    var q = document.getElementById('search-input').value.trim(); if (q) doSearch(q);
  });
});

async function doSearch(q) {
  var el = document.getElementById('search-results'); el.innerHTML = '<div class="loading-spinner"></div>';
  try {
    var api = searchMode === 'qq' ? '/api/qq/search?keywords=' : '/api/search?keywords=';
    var data = await apiJson(api + encodeURIComponent(q) + '&limit=30');
    var songs = data.songs || data.result || [];
    if (!songs.length) { el.innerHTML = '<div class="empty-state">没有找到相关结果</div>'; return; }
    el.innerHTML = songs.map(function(s, i) {
      return '<div class="search-result-item" onclick="playFromSearch(' + i + ')"><img class="sri-cover" src="' + songCoverSrc(s, 80) + '" onerror="this.style.opacity=0"><div class="sri-info"><div class="sri-title">' + escapeHtml(songTitle(s)) + '</div><div class="sri-artist">' + escapeHtml(songArtist(s)) + '</div><span class="sri-source ' + (searchMode === 'qq' ? 'qq' : 'netease') + '">' + (searchMode === 'qq' ? 'QQ' : '网易云') + '</span></div><div class="sri-play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>';
    }).join('');
    window._searchResults = songs;
  } catch (e) { el.innerHTML = '<div class="empty-state">搜索失败</div>'; }
}

function playFromSearch(i) { var s = window._searchResults; if (!s || !s[i]) return; playQueue = s.map(normalizeSong); currentIdx = i; playQueueAt(currentIdx); }
function normalizeSong(s) { return { id: s.id || s.songid, mid: s.mid || s.songmid, name: songTitle(s), artist: songArtist(s), cover: s.cover || (s.al && s.al.picUrl) || '', source: searchMode === 'qq' ? 'qq' : 'netease' }; }

// 播放
async function playQueueAt(idx) {
  if (idx < 0 || idx >= playQueue.length) return;
  currentIdx = idx; var song = playQueue[idx];
  updateMiniPlayer(song); updateFullPlayer(song); updateLyrics(song);
  try {
    var ua = song.source === 'qq' ? '/api/qq/song/url?mid=' + (song.mid || song.id) : '/api/song/url?id=';
    var ud = await apiJson(ua + (song.id || song.mid));
    var u = ud.url || (ud.data && ud.data[0] && ud.data[0].url);
    if (!u) { showToast('无法获取播放链接'); nextTrack(); return; }
    audio.src = u;
    await audio.play(); playing = true; updatePlayButtons(); updateMediaSession();
  } catch (e) { showToast('播放失败'); nextTrack(); }
}

function togglePlay() {
  if (!audio.src && playQueue.length) { playQueueAt(currentIdx >= 0 ? currentIdx : 0); return; }
  if (audio.paused) { audio.play().then(function() { playing = true; }).catch(function() {}); } else { audio.pause(); playing = false; }
  updatePlayButtons();
}
function nextTrack() { if (!playQueue.length) return; if (playMode === 'single') { playQueueAt(currentIdx); return; } var n = currentIdx + 1; if (n >= playQueue.length) n = 0; playQueueAt(n); }
function prevTrack() { if (!playQueue.length) return; var p = currentIdx - 1; if (p < 0) p = playQueue.length - 1; playQueueAt(p); }
function togglePlayMode() { var m = ['list', 'single', 'shuffle']; var i = m.indexOf(playMode); i = (i + 1) % 3; playMode = m[i]; showToast({ list: '顺序播放', single: '单曲循环', shuffle: '随机播放' }[playMode]); }

audio.addEventListener('ended', nextTrack);
audio.addEventListener('timeupdate', function() {
  if (audio.duration) {
    var pct = (audio.currentTime / audio.duration) * 100;
    document.getElementById('mp-progress').style.width = pct + '%';
    document.getElementById('fp-progress-fill').style.width = pct + '%';
    document.getElementById('fp-progress-handle').style.left = pct + '%';
    document.getElementById('fp-current').textContent = formatTime(audio.currentTime);
    document.getElementById('fp-duration').textContent = formatTime(audio.duration);
    updateLyricPosition();
  }
});

function updatePlayButtons() {
  var ic = playing ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>' : '<path d="M8 5v14l11-7z"/>';
  document.getElementById('mp-play-icon').innerHTML = ic;
  document.getElementById('fp-play-icon').innerHTML = ic;
}
function updateMiniPlayer(s) {
  document.getElementById('mini-player').classList.remove('hidden');
  document.getElementById('mp-cover').src = songCoverSrc(s, 88) || '';
  document.getElementById('mp-title').textContent = s.name || '';
  document.getElementById('mp-artist').textContent = s.artist || '';
}
function updateFullPlayer(s) {
  document.getElementById('fp-cover').src = songCoverSrc(s, 400) || '';
  document.getElementById('fp-bg-img').src = songCoverSrc(s, 200) || '';
  document.getElementById('fp-song').textContent = s.name || '';
  document.getElementById('fp-artist').textContent = s.artist || '';
  document.getElementById('fp-name').textContent = s.name || '';
}
function openFullPlayer() { document.getElementById('full-player').classList.add('show'); }
function closeFullPlayer() { document.getElementById('full-player').classList.remove('show'); }
document.getElementById('fp-progress-bar').addEventListener('click', function(e) {
  if (!audio.duration) return; var r = this.getBoundingClientRect(); audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
});

// 歌词
async function updateLyrics(song) {
  lyricsLines = []; currentLyricIdx = -1;
  document.getElementById('fp-lyrics').innerHTML = '<div class="fp-lyric-line">加载歌词中…</div>';
  try {
    var api = song.source === 'qq' ? '/api/qq/lyric?mid=' + (song.mid || song.id) : '/api/lyric?id=';
    var data = await apiJson(api + (song.id || song.mid));
    var lrc = (data.lrc && data.lrc.lyric) || data.lyric || '';
    if (!lrc) { document.getElementById('fp-lyrics').innerHTML = '<div class="fp-lyric-line">暂无歌词</div>'; return; }
    lyricsLines = parseLrc(lrc); renderLyrics();
  } catch (e) { document.getElementById('fp-lyrics').innerHTML = '<div class="fp-lyric-line">歌词加载失败</div>'; }
}
function parseLrc(lrc) {
  var lines = []; lrc.split('\n').forEach(function(line) {
    var m = line.match(/\[(\d+):(\d+(?:\.\d+)?)\](.*)/);
    if (m) lines.push({ t: parseInt(m[1]) * 60 + parseFloat(m[2]), text: m[3].trim() });
  }); return lines;
}
function renderLyrics() {
  document.getElementById('fp-lyrics').innerHTML = lyricsLines.map(function(l, i) {
    return '<div class="fp-lyric-line' + (i === currentLyricIdx ? ' active' : '') + '">' + escapeHtml(l.text || '♪') + '</div>';
  }).join('');
}
function updateLyricPosition() {
  if (!lyricsLines.length) return; var t = audio.currentTime, idx = -1;
  for (var i = 0; i < lyricsLines.length; i++) { if (lyricsLines[i].t <= t) idx = i; else break; }
  if (idx !== currentLyricIdx) {
    currentLyricIdx = idx; var ls = document.getElementById('fp-lyrics').querySelectorAll('.fp-lyric-line');
    ls.forEach(function(l, i) { l.classList.toggle('active', i === idx); });
    if (idx >= 0 && ls[idx]) ls[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function openLoginSheet() { document.getElementById('login-sheet').classList.add('show'); document.getElementById('overlay').classList.add('show'); refreshQr(); }
function closePanel(id) { document.getElementById(id).classList.remove('show'); document.getElementById('overlay').classList.remove('show'); if (qrPollTimer) { clearInterval(qrPollTimer); qrPollTimer = null; } }
function closeAllPanels() { closePanel('login-sheet'); closePanel('visual-panel'); }
function switchLoginProvider(p) {
  loginProvider = p;
  document.querySelectorAll('.login-tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelector('.login-tab[data-provider="' + p + '"]').classList.add('active');
  document.getElementById('cookie-note').textContent = p === 'qq' ? '从 y.qq.com 登录后复制 cookie。' : '从 music.163.com 登录后复制 cookie。';
  refreshQr();
}
async function refreshQr() {
  if (qrPollTimer) { clearInterval(qrPollTimer); qrPollTimer = null; }
  var st = document.getElementById('qr-status');
  if (loginProvider === 'qq') { document.getElementById('qr-img').src = ''; st.textContent = '点击"网页登录"或手动导入'; st.className = ''; return; }
  try {
    var k = await apiJson('/api/login/qr/key'); if (!k.key) throw new Error('获取 key 失败');
    qrKey = k.key; var q = await apiJson('/api/login/qr/create?key=' + encodeURIComponent(qrKey));
    if (!q.img) throw new Error('生成二维码失败');
    document.getElementById('qr-img').src = q.img; st.textContent = '请使用网易云音乐 App 扫码'; st.className = '';
    qrPollTimer = setInterval(checkQr, 2000);
  } catch (e) { st.textContent = '出错: ' + e.message; st.className = 'fail'; }
}
async function checkQr() {
  if (!qrKey) return;
  try {
    var r = await apiJson('/api/login/qr/check?key=' + encodeURIComponent(qrKey));
    if (r.code === 800) { document.getElementById('qr-status').textContent = '二维码过期'; document.getElementById('qr-status').className = 'fail'; if (qrPollTimer) { clearInterval(qrPollTimer); qrPollTimer = null; } }
    else if (r.code === 803) { document.getElementById('qr-status').textContent = '登录成功'; document.getElementById('qr-status').className = 'scan'; if (qrPollTimer) { clearInterval(qrPollTimer); qrPollTimer = null; } await refreshLoginStatus(); closeAllPanels(); showToast('登录成功'); loadHome(); updateSettingsAccount(); }
    else if (r.code === 802) { document.getElementById('qr-status').textContent = '等待确认…'; }
  } catch (e) {}
}
async function openWebLogin() {
  var api = window.desktopWindow;
  if (!api || !(api.isDesktop || api.isCapacitorNative)) { showToast('当前环境不支持网页登录，请扫码或手动导入'); return; }
  try {
    var r = loginProvider === 'qq' ? await api.openQQMusicLogin() : await api.openNeteaseMusicLogin();
    if (r && r.ok && r.cookie) {
      var ca = loginProvider === 'qq' ? '/api/qq/login/cookie' : '/api/login/cookie';
      var info = await apiJson(ca, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ cookie: r.cookie }) });
      if (info && info.loggedIn) { if (loginProvider === 'qq') { qqLoginStatus = info; } else { loginStatus = info; } closeAllPanels(); showToast('登录成功: ' + (info.nickname || '')); loadHome(); updateSettingsAccount(); }
    }
  } catch (e) { showToast('登录失败'); }

function toggleCookiePanel() { document.getElementById('cookie-panel').classList.toggle('show'); }
async function submitCookieLogin() {

    if (info && info.loggedIn) { if (loginProvider === 'qq') { qqLoginStatus = info; } else { loginStatus = info; } document.getElementById('cookie-input').value = ''; closeAllPanels(); showToast('登录成功: ' + (info.nickname || '')); loadHome(); updateSettingsAccount(); }

function applyFxToVisual() { if (window.uniforms) { if (uniforms.uIntensity) uniforms.uIntensity.value = fx.intensity; if (uniforms.uParticleSize) uniforms.uParticleSize.value = fx.particleSize; if (uniforms.uBloomStrength) uniforms.uBloomStrength.value = fx.bloomStrength; } }
function saveFx() { try { localStorage.setItem('bodhibeats-fx', JSON.stringify(fx)); } catch (e) {} }
function loadFx() { try { var s = localStorage.getItem('bodhibeats-fx'); if (s) fx = Object.assign(fx, JSON.parse(s)); } catch (e) {} }
function selectPreset(p) {
  fx.preset = p; var presets = { 0: { intensity: 1.0, particleSize: 1.55, bloomStrength: 0.6 }, 1: { intensity: 0.7, particleSize: 1.2, bloomStrength: 0.3 }, 2: { intensity: 1.2, particleSize: 2.0, bloomStrength: 0.9 }, 3: { intensity: 0.9, particleSize: 1.4, bloomStrength: 0.5 }, 4: { intensity: 1.3, particleSize: 1.8, bloomStrength: 0.8 }, 5: { intensity: 1.1, particleSize: 1.6, bloomStrength: 0.7 }, 6: { intensity: 0.5, particleSize: 0.8, bloomStrength: 0.2 } };
  Object.assign(fx, presets[p] || presets[0]); applyFxToVisual(); saveFx(); renderVisualControls();
}

// Three.js 粒子
var scene, camera, renderer, particles, uniforms;

var audioCtx, analyser, frequencyData;

function initVisual() {
  scene = new THREE.Scene(); scene.background = null;
  camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100); camera.position.z = 6;
  renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true, powerPreference: 'high-performance' });
  renderer.setClearColor(0x000000, 0);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.5));
  renderer.setSize(innerWidth, innerHeight);
  document.getElementById('canvas-container').appendChild(renderer.domElement);
  uniforms = { uTime: { value: 0 }, uBass: { value: 0 }, uMid: { value: 0 }, uTreble: { value: 0 }, uBeat: { value: 0 }, uIntensity: { value: fx.intensity }, uParticleSize: { value: fx.particleSize }, uBloomStrength: { value: fx.bloomStrength } };
  var count = 4096, pos = new Float32Array(count * 3), col = new Float32Array(count * 3), sz = new Float32Array(count);
  for (var i = 0; i < count; i++) {
    var r = 2 + Math.random() * 3, th = Math.random() * Math.PI * 2, ph = Math.acos(2 * Math.random() - 1);
    pos[i * 3] = r * Math.sin(ph) * Math.cos(th); pos[i * 3 + 1] = r * Math.sin(ph) * Math.sin(th); pos[i * 3 + 2] = r * Math.cos(ph);
    var c = new THREE.Color().setHSL(0.5 + Math.random() * 0.2, 0.7, 0.5);
    col[i * 3] = c.r; col[i * 3 + 1] = c.g; col[i * 3 + 2] = c.b; sz[i] = 0.5 + Math.random() * 2;
  }
  var g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  g.setAttribute('aColor', new THREE.BufferAttribute(col, 3));
  g.setAttribute('aSize', new THREE.BufferAttribute(sz, 1));
  var vs = 'attribute vec3 aColor;attribute float aSize;uniform float uTime,uBass,uParticleSize;varying vec3 vColor;varying float vAlpha;void main(){vColor=aColor;vec3 p=position;p*=1.0+uBass*0.3+sin(uTime*0.5+p.x*0.3)*0.1;vec4 mv=modelViewMatrix*vec4(p,1.0);gl_Position=projectionMatrix*mv;gl_PointSize=aSize*uParticleSize*(300.0/-mv.z);vAlpha=0.6+uBass*0.4;}';
  var fs = 'uniform float uBloomStrength;varying vec3 vColor;varying float vAlpha;void main(){vec2 c=gl_PointCoord-0.5;float d=length(c);if(d>0.5)discard;float a=(1.0-smoothstep(0.0,0.5,d))*vAlpha;vec3 col=vColor+uBloomStrength*0.3;gl_FragColor=vec4(col,a);}';
  var m = new THREE.ShaderMaterial({ uniforms: uniforms, vertexShader: vs, fragmentShader: fs, transparent: true, depthWrite: false, blending: THREE.AdditiveBlending });
  particles = new THREE.Points(g, m); scene.add(particles);
  window.addEventListener('resize', function() { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });
  renderer.domElement.addEventListener('webglcontextlost', function(e) { e.preventDefault(); }, false);
  renderer.domElement.addEventListener('webglcontextrestored', function() { initVisual(); }, false);
}

function initAudioAnalyser() {
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); var src = audioCtx.createMediaElementSource(audio); analyser = audioCtx.createAnalyser(); analyser.fftSize = 256; src.connect(analyser); analyser.connect(audioCtx.destination); frequencyData = new Uint8Array(analyser.frequencyBinCount); } catch (e) {}
}
function resumeAudio() { if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(function() {}); }
document.addEventListener('pointerdown', function() { resumeAudio(); initAudioAnalyser(); }, { once: true });

var prevTime = performance.now();
function animate() {
  requestAnimationFrame(animate);
  var now = performance.now(), dt = Math.min((now - prevTime) / 1000, 0.05); prevTime = now;
  uniforms.uTime.value += dt;
  if (analyser && playing && !audio.paused) {
    analyser.getByteFrequencyData(frequencyData);
    var b = 0, m = 0, t = 0; for (var i = 0; i < 4; i++) b += frequencyData[i]; for (var i = 4; i < 32; i++) m += frequencyData[i]; for (var i = 32; i < frequencyData.length; i++) t += frequencyData[i];
    b /= 4 * 255; m /= 28 * 255; t /= (frequencyData.length - 32) * 255;
    bass = bass * 0.85 + b * 0.15; mid = mid * 0.85 + m * 0.15; treble = treble * 0.85 + t * 0.15;
    beatPulse *= 0.92; if (bass > 0.5) beatPulse = Math.max(beatPulse, bass * 0.6);
  } else { bass *= 0.95; mid *= 0.95; treble *= 0.95; beatPulse *= 0.9; }
  uniforms.uBass.value = bass * fx.intensity; uniforms.uMid.value = mid; uniforms.uTreble.value = treble; uniforms.uBeat.value = beatPulse;
  if (particles) { particles.rotation.y += dt * 0.08; particles.rotation.x += dt * 0.02; }
  renderer.render(scene, camera);
}

// MediaSession
if ('mediaSession' in navigator) { try { navigator.mediaSession.setActionHandler('play', function() { if (!playing) togglePlay(); }); navigator.mediaSession.setActionHandler('pause', function() { if (playing) togglePlay(); }); navigator.mediaSession.setActionHandler('previoustrack', prevTrack); navigator.mediaSession.setActionHandler('nexttrack', nextTrack); } catch (e) {} }
function updateMediaSession() { if (!('mediaSession' in navigator)) return; var s = playQueue[currentIdx]; if (!s) return; try { navigator.mediaSession.metadata = new MediaMetadata({ title: s.name || 'BodhiBeats', artist: s.artist || '', album: 'BodhiBeats', artwork: songCoverSrc(s, 512) ? [{ src: songCoverSrc(s, 512), sizes: '512x512', type: 'image/png' }] : [] }); navigator.mediaSession.playbackState = playing ? 'playing' : 'paused'; } catch (e) {} }
setInterval(function() { if ('mediaSession' in navigator) { try { navigator.mediaSession.playbackState = playing ? 'playing' : 'paused'; } catch (e) {} } }, 2000);

function openQueuePanel() {
  if (!playQueue.length) { showToast('播放队列为空'); return; }
  var html = playQueue.map(function(s, i) { return '<div class="playlist-track' + (i === currentIdx ? ' playing' : '') + '" onclick="playFromPlaylist(' + i + ')"><div class="pt-idx">' + (i + 1) + '</div><div class="pt-info"><div class="pt-title">' + escapeHtml(songTitle(s)) + '</div><div class="pt-artist">' + escapeHtml(songArtist(s)) + '</div></div></div>'; }).join('');
  document.getElementById('view-library').innerHTML = '<div style="padding:calc(var(--safe-top) + 12px) 16px calc(var(--nav-h) + var(--player-h) + 24px + var(--safe-bottom))"><div class="home-greeting">播放队列</div><div class="home-date">' + playQueue.length + ' 首</div><div class="playlist-list" style="margin-top:16px">' + html + '</div></div>';
  switchView('library');
}

// Splash 进入
function dismissBodhiBeatsSplash() {
  var s = document.getElementById('splash'); if (!s || s.classList.contains('hide') || s.classList.contains('exiting')) return;
  splashAnimating = false; s.classList.add('exiting'); document.getElementById('app').classList.remove('hidden');
  setTimeout(function() { s.classList.add('hide'); s.style.display = 'none'; }, 1180);
  loadHome(); refreshLoginStatus().then(function() { if (loginStatus.loggedIn) { updateSettingsAccount(); loadHomePlaylists(); } });
}
document.getElementById('splash-enter').addEventListener('click', dismissBodhiBeatsSplash);
document.getElementById('splash').addEventListener('click', function(e) { if (splashReadyToEnter) dismissBodhiBeatsSplash(); });
document.addEventListener('keydown', function(e) { if (!document.getElementById('splash').classList.contains('hide') && (e.key === 'Enter' || e.code === 'Space')) { e.preventDefault(); if (splashReadyToEnter) dismissBodhiBeatsSplash(); } });
splashTimer = setTimeout(function() { splashReadyToEnter = true; var s = document.getElementById('splash'); if (s) { s.classList.add('ready'); var en = document.getElementById('splash-enter'); if (en) en.style.opacity = '1'; } }, 5000);

// 长按唤起视觉面板
var lpTimer = null;
document.addEventListener('touchstart', function(e) {
  if (e.target.closest('#bottom-nav,#mini-player,#full-player,.bottom-sheet,#overlay,.search-header,button,input,.tile,.search-result-item,.playlist-track')) return;
  lpTimer = setTimeout(function() { document.getElementById('visual-panel').classList.add('show'); document.getElementById('overlay').classList.add('show'); }, 600);
}, { passive: true });
document.addEventListener('touchend', function() { if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; } }, { passive: true });
document.addEventListener('touchmove', function() { if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; } }, { passive: true });

// SW
if ('serviceWorker' in navigator && !(window.bodhiBeatsPlatform && window.bodhiBeatsPlatform.isCapacitor)) { navigator.serviceWorker.register('sw.js').catch(function() {}); }

// 初始化
loadFx(); initVisual(); animate(); renderVisualControls(); updateSettingsAccount();

</script>
