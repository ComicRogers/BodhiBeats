<!-- 主应用 -->
<div id="app" class="hidden">
  <div id="view-container">
    <div class="view active" id="view-home">
      <div class="home-greeting">BodhiBeats</div>
      <div class="home-date" id="home-date"></div>
      <div class="weather-card" id="weather-card" style="display:none">
        <div class="wc-temp" id="wc-temp"></div>
        <div class="wc-city" id="wc-city"></div>
        <div class="wc-mood" id="wc-mood"></div>
        <button class="wc-play" id="wc-play">播放天气电台</button>
      </div>
      <div class="home-section"><div class="home-section-title">每日推荐</div><div class="tile-grid" id="home-daily"></div></div>
      <div class="home-section"><div class="home-section-title">我的歌单</div><div class="tile-grid" id="home-playlists"></div></div>
    </div>
    <div class="view" id="view-search">
      <div class="search-header">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="search" id="search-input" placeholder="搜索歌曲、歌手" autocomplete="off">
        </div>
        <div class="search-tabs" id="search-tabs"><div class="search-tab active" data-mode="netease">网易云</div><div class="search-tab" data-mode="qq">QQ 音乐</div></div>
      </div>
      <div class="search-result-list" id="search-results"><div class="empty-state">输入关键词开始搜索</div></div>
    </div>
    <div class="view" id="view-library"><div class="home-greeting">音乐库</div><div class="home-date" id="library-info">登录后查看歌单</div><div class="tile-grid" id="library-playlists" style="margin-top:16px"><div class="empty-state">暂无歌单</div></div></div>
    <div class="view" id="view-visual">
      <div class="home-greeting">视觉</div>
      <div class="home-date">长按屏幕唤起视觉控制</div>
      <div class="home-section"><div class="home-section-title">视觉预设</div><div class="vp-preset-grid" id="visual-presets"></div></div>
      <div class="home-section"><div class="home-section-title">参数</div><div id="visual-controls"></div></div>
    </div>
    <div class="view" id="view-settings">
      <div class="home-greeting">设置</div>
      <div class="home-date">BodhiBeats v1.0.0</div>
      <div class="home-section"><div class="home-section-title">账号</div><div id="settings-account"><div class="empty-state">未登录</div></div></div>
    </div>
  </div>
  <div id="mini-player" class="hidden" onclick="openFullPlayer()">
    <img class="mp-cover" id="mp-cover" src="">
    <div class="mp-info"><div class="mp-title" id="mp-title"></div><div class="mp-artist" id="mp-artist"></div></div>
    <div class="mp-play-btn" id="mp-play-btn" onclick="event.stopPropagation();togglePlay()"><svg viewBox="0 0 24 24" id="mp-play-icon"><path d="M8 5v14l11-7z"/></svg></div>
    <div class="mp-progress" id="mp-progress"></div>
  </div>
  <div id="bottom-nav">
    <div class="nav-item active" data-view="home" onclick="switchView('home')"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>首页</span></div>
    <div class="nav-item" data-view="search" onclick="switchView('search')"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><span>搜索</span></div>
    <div class="nav-item" data-view="library" onclick="switchView('library')"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><span>音乐库</span></div>
    <div class="nav-item" data-view="visual" onclick="switchView('visual')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg><span>视觉</span></div>
    <div class="nav-item" data-view="settings" onclick="switchView('settings')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span>设置</span></div>
  </div>
</div>

<!-- 全屏播放器 -->
<div id="full-player">
  <div class="fp-bg"><img id="fp-bg-img" src=""></div>
  <div class="fp-content">
    <div class="fp-header"><div class="fp-down" onclick="closeFullPlayer()"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div><div class="fp-title-bar"><div class="fp-from">正在播放</div><div class="fp-name" id="fp-name"></div></div><div style="width:36px"></div></div>
    <div class="fp-cover-wrap"><img class="fp-cover" id="fp-cover" src=""></div>
    <div class="fp-meta"><div class="fp-song" id="fp-song"></div><div class="fp-artist" id="fp-artist"></div></div>
    <div class="fp-lyrics" id="fp-lyrics"></div>
    <div class="fp-progress"><div class="fp-progress-bar" id="fp-progress-bar"><div class="fp-progress-fill" id="fp-progress-fill"></div><div class="fp-progress-handle" id="fp-progress-handle"></div></div><div class="fp-time"><span id="fp-current">0:00</span><span id="fp-duration">0:00</span></div></div>
    <div class="fp-controls">
      <div class="fp-btn mode" onclick="togglePlayMode()"><svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg></div>
      <div class="fp-btn" onclick="prevTrack()"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zM9.5 12l8.5 6V6z"/></svg></div>
      <div class="fp-btn play" id="fp-play-btn" onclick="togglePlay()"><svg viewBox="0 0 24 24" id="fp-play-icon"><path d="M8 5v14l11-7z"/></svg></div>
      <div class="fp-btn" onclick="nextTrack()"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></div>
      <div class="fp-btn list" onclick="openQueuePanel()"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></div>
    </div>
  </div>
</div>

<!-- 视觉控制面板 -->
<div id="visual-panel" class="bottom-sheet">
  <div class="bs-handle" onclick="closePanel('visual-panel')"></div>
  <div class="bs-title">视觉控制</div>
  <div class="bs-content">
    <div class="vp-section"><div class="vp-section-title">预设</div><div class="vp-preset-grid" id="vp-presets"></div></div>
    <div class="vp-section"><div class="vp-section-title">参数</div><div id="vp-controls"></div></div>
  </div>
</div>

<!-- 登录弹窗 -->
<div id="login-sheet" class="bottom-sheet" style="max-height:80vh">
  <div class="bs-handle" onclick="closePanel('login-sheet')"></div>
  <div class="bs-title">扫码登录</div>
  <div class="bs-content">
    <div class="login-tabs"><div class="login-tab active" data-provider="netease" onclick="switchLoginProvider('netease')">网易云音乐</div><div class="login-tab" data-provider="qq" onclick="switchLoginProvider('qq')">QQ 音乐</div></div>
    <div id="qr-container">
      <img class="qr-img" id="qr-img" src=""><div class="qr-status" id="qr-status">正在生成二维码…</div>
      <div class="login-actions"><button onclick="refreshQr()">刷新二维码</button><button class="primary" onclick="openWebLogin()">网页登录</button></div>
      <div class="login-actions"><button id="cookie-toggle-btn" onclick="toggleCookiePanel()">手动导入</button></div>
      <div class="cookie-panel" id="cookie-panel"><textarea id="cookie-input" placeholder="粘贴 cookie…" spellcheck="false"></textarea><div class="cookie-note" id="cookie-note">从对应平台官网登录后复制 cookie。</div><button class="cookie-btn" onclick="submitCookieLogin()">保存</button></div>
    </div>
  </div>
</div>

<div id="overlay" onclick="closeAllPanels()"></div>
<div id="toast"></div>
