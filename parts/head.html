<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>BodhiBeats</title>
<meta name="referrer" content="no-referrer">
<meta name="theme-color" content="#050608">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.webmanifest">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="vendor/three.r128.min.js"></script>
<script src="vendor/gsap.min.js"></script>
<script src="capacitor-bridge.js"></script>
<script>
(function(){
  var isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  var isCap = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
  window.bodhiBeatsPlatform = { isTouch: isTouch, isCapacitor: isCap, apiBase: '' };
  try { var qs = new URLSearchParams(location.search).get('api'); if (qs) { window.bodhiBeatsPlatform.apiBase = qs.replace(/\/+$/,''); } } catch(e) {}
  if (isTouch) document.documentElement.classList.add('bodhi-touch');
  var base = window.bodhiBeatsPlatform.apiBase;
  if (base) { var nf = window.fetch.bind(window); window.fetch = function(input, init){ if (typeof input === 'string' && input.charAt(0) === '/' && input.indexOf('/api/') === 0) input = base + input; return nf(input, init); }; }
})();
</script>
